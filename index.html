<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Saya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Portfolio Saya</h1>
        <div class="clock-container">
            <span id="clock">00:00:00</span>
        </div>
        <button id="darkModeBtn">🌙 Dark Mode</button>
    </header>

    <section class="profile">
        <img id="profilePic" src="https://via.placeholder.com/150" alt="Foto Profil">
        <h2 id="profileName">Pengguna</h2>
        <input type="text" id="nameInput" placeholder="Masukkan nama">
        <button id="saveNameBtn">Simpan Nama</button>
        <br><br>
        <input type="file" id="profileUpload" accept="image/*">
    </section>

    <button id="backToTop">↑</button>

    <script src="script.js"></script>
</body>
</html>
