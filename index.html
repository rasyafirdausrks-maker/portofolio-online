<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Saya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Portfolio Saya</h1>

        <div class="clock-container">
            <span id="clock">00:00:00</span>
        </div>

        <button id="darkModeBtn">🌙 Dark Mode</button>
    </header>

    <!-- PROFIL -->
    <section class="profile">

        <img
            id="profilePic"
            src="https://via.placeholder.com/150"
            alt="Foto Profil">

        <h2 id="profileName">Pengguna</h2>

        <input
            type="text"
            id="nameInput"
            placeholder="Masukkan nama">

        <button id="saveNameBtn">
            Simpan Nama
        </button>

        <br><br>

        <input
            type="file"
            id="profileUpload"
            accept="image/*">

    </section>

    <!-- LOGIN REGISTER -->
    <section class="auth">

        <h2>Login / Register</h2>

        <input
            type="text"
            id="usernameInput"
            placeholder="Username">

        <input
            type="password"
            id="passwordInput"
            placeholder="Password">

        <br><br>

        <button id="registerBtn">
            Register
        </button>

        <button id="loginBtn">
            Login
        </button>

        <button id="logoutBtn">
            Logout
        </button>

        <p id="loginStatus">
            Belum Login
        </p>

    </section>

    <!-- UPLOAD FILE -->
    <section class="upload-section">

        <h2>Upload File</h2>

        <input
            type="file"
            id="fileUpload">

        <ul id="fileList"></ul>

    </section>

    <!-- GALERI FOTO -->
    <section class="gallery-section">

        <h2>Galeri Foto</h2>

        <input
            type="file"
            id="galleryUpload"
            accept="image/*">

        <div id="gallery"></div>

    </section>

    <!-- KONTEN -->
    <main>

        <section>
            <h2>Selamat Datang</h2>
            <p>Ini adalah web portfolio saya.</p>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
